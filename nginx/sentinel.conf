# /etc/nginx/sites-available/sentinel
# Reverse proxy: nginx:80 → sentinel Next.js:8093

upstream sentinel_app {
    server 127.0.0.1:8093;
    keepalive 32;
}

server {
    listen 8083;
    server_name _;          # reemplazar con IP o dominio real si hay uno

    # Seguridad básica
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Logs
    access_log /var/log/nginx/sentinel_access.log;
    error_log  /var/log/nginx/sentinel_error.log warn;

    # Archivos estáticos Next.js — caché agresivo
    location /_next/static/ {
        proxy_pass http://sentinel_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # Favicon e imágenes públicas
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        proxy_pass http://sentinel_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        proxy_set_header Host $host;
    }

    # WebSocket support (Next.js HMR / Supabase realtime si se usa desde client)
    location /_next/webpack-hmr {
        proxy_pass http://sentinel_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Todo lo demás → Next.js
    location / {
        proxy_pass         http://sentinel_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffer_size      16k;
        proxy_buffers          8 32k;
        proxy_busy_buffers_size 64k;

        # No cachear respuestas dinámicas
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Bloquear acceso directo a archivos sensibles
    location ~ /\. { deny all; 
    }

}
